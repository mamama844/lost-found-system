{% extends "base.html" %}

{% block title %}重置密码 - 城市失物招领系统{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow" style="background: rgba(10,10,26,0.9); border: 1px solid rgba(0,212,255,0.3); border-radius: 15px; backdrop-filter: blur(10px);">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4" style="color: #00d4ff;">
                        <i class="bi bi-lock"></i> 重置密码
                    </h3>
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label" style="color:#d0d0e0;">新密码</label>
                            <input type="password" class="form-control" name="password" placeholder="请输入新密码(至少6位)" required minlength="6" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(0,212,255,0.3); color:#ffffff; border-radius: 8px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="color:#d0d0e0;">确认密码</label>
                            <input type="password" class="form-control" name="confirm_password" placeholder="请再次输入新密码" required style="background: rgba(255,255,255,0.08); border: 1px solid rgba(0,212,255,0.3); color:#ffffff; border-radius: 8px;">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn" style="background: linear-gradient(135deg, #00d4ff, #7b2cbf); color: white; border: none; border-radius: 10px; padding: 10px;">
                                <i class="bi bi-check-circle"></i> 确认重置
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.form-control::placeholder { color: rgba(176,176,192,0.5); }
.form-control:focus { background: rgba(255,255,255,0.12) !important; border-color: #00d4ff !important; color:#ffffff !important; box-shadow: 0 0 0 0.2rem rgba(0,212,255,0.15) !important; }
</style>
{% endblock %}
