{% extends "base.html" %}

{% block title %}修改密码 - 城市失物招领系统{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" style="color: var(--primary-color);">个人中心</h5>
                    <hr style="border-color: var(--border-color);">
                    <div class="d-grid gap-2">
                        <a href="{{ url_for('main.profile') }}" class="btn btn-outline-primary">
                            <i class="bi bi-person me-2"></i>个人中心
                        </a>
                        <a href="{{ url_for('auth.edit_profile') }}" class="btn btn-outline-primary">
                            <i class="bi bi-gear me-2"></i>修改信息
                        </a>
                        <a href="{{ url_for('auth.change_password') }}" class="btn btn-primary">
                            <i class="bi bi-key me-2"></i>修改密码
                        </a>
                        <a href="{{ url_for('auth.credit_records') }}" class="btn btn-outline-primary">
                            <i class="bi bi-star me-2"></i>信用记录
                        </a>
                        <a href="{{ url_for('auth.notifications') }}" class="btn btn-outline-primary">
                            <i class="bi bi-bell me-2"></i>消息通知
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-9">
            <div class="card" style="border: 1px solid rgba(0,212,255,0.2);">
                <div class="card-header" style="background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.2);">
                    <h5 class="mb-0" style="color: #00d4ff;"><i class="bi bi-key me-2"></i>修改密码</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label" style="color:#d0d0e0;">原密码</label>
                            <input type="password" class="form-control" name="old_password" required style="background: rgba(255,255,255,0.08); border: 1px solid rgba(0,212,255,0.3); color:#ffffff; border-radius: 8px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="color:#d0d0e0;">新密码</label>
                            <input type="password" class="form-control" name="new_password" required minlength="6" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(0,212,255,0.3); color:#ffffff; border-radius: 8px;">
                            <small style="color:#a0a0b0;">密码长度至少6位</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="color:#d0d0e0;">确认新密码</label>
                            <input type="password" class="form-control" name="confirm_password" required style="background: rgba(255,255,255,0.08); border: 1px solid rgba(0,212,255,0.3); color:#ffffff; border-radius: 8px;">
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('main.profile') }}" class="btn btn-outline-secondary">返回</a>
                            <button type="submit" class="btn" style="background: linear-gradient(135deg, #00d4ff, #7b2cbf); color: white; border: none; border-radius: 10px; padding: 8px 20px;">
                                <i class="bi bi-check-lg me-1"></i>确认修改
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.form-control::placeholder { color: rgba(176,176,192,0.5); }
.form-control:focus { background: rgba(255,255,255,0.12) !important; border-color: #00d4ff !important; color:#ffffff !important; box-shadow: 0 0 0 0.2rem rgba(0,212,255,0.15) !important; }
</style>
{% endblock %}
