{% extends "base.html" %}

{% block title %}忘记密码 - 城市失物招领系统{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow" style="background: rgba(10,10,26,0.9); border: 1px solid rgba(0,212,255,0.3); border-radius: 15px; backdrop-filter: blur(10px);">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4" style="color: #00d4ff;">
                        <i class="bi bi-key"></i> 找回密码
                    </h3>
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label" style="color:#d0d0e0;">注册邮箱</label>
                            <input type="email" class="form-control" name="email" placeholder="请输入注册时使用的邮箱" required style="background: rgba(255,255,255,0.08); border: 1px solid rgba(0,212,255,0.3); color:#ffffff; border-radius: 8px;">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn" style="background: linear-gradient(135deg, #00d4ff, #7b2cbf); color: white; border: none; border-radius: 10px; padding: 10px;">
                                <i class="bi bi-envelope"></i> 发送重置链接
                            </button>
                        </div>
                    </form>
                    <hr style="border-color: rgba(0,212,255,0.2);">
                    <p class="text-center mb-0" style="color:#d0d0e0;">
                        <a href="{{ url_for('auth.login') }}" style="color: #00d4ff;">返回登录</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.form-control::placeholder { color: rgba(176,176,192,0.5); }
.form-control:focus { background: rgba(255,255,255,0.12) !important; border-color: #00d4ff !important; color:#ffffff !important; box-shadow: 0 0 0 0.2rem rgba(0,212,255,0.15) !important; }
</style>
{% endblock %}
