<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0a0a1a; color:#ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(10,10,26,0.95); border: 1px solid rgba(0,212,255,0.3); border-radius: 15px; backdrop-filter: blur(20px); padding: 40px; width: 400px; }
        .login-card h3 { color: #00d4ff; }
        .form-control { background: rgba(255,255,255,0.08); border: 1px solid rgba(0,212,255,0.3); color:#ffffff; border-radius: 8px; }
        .form-control:focus { background: rgba(255,255,255,0.12); border-color: #00d4ff; color:#ffffff; box-shadow: 0 0 0 0.2rem rgba(0,212,255,0.15); }
        .form-control::placeholder { color: rgba(176,176,192,0.5); }
        .btn-login { background: linear-gradient(135deg, #00d4ff, #7b2cbf); color: white; border: none; border-radius: 10px; padding: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock" style="font-size:3rem;color:#00d4ff;"></i>
            <h3 class="mt-3">管理员登录</h3>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category if category != 'message' else 'info' }} mb-3">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label" style="color:#d0d0e0;">用户名</label>
                <input type="text" class="form-control" name="username" required placeholder="请输入管理员用户名">
            </div>
            <div class="mb-4">
                <label class="form-label" style="color:#d0d0e0;">密码</label>
                <input type="password" class="form-control" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-1"></i>登录
            </button>
        </form>
    </div>
</body>
</html>
