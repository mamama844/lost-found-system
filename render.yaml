services:
  - type: web
    name: lost-found-system
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn run:app
    disk:
      name: data
      mountPath: /opt/render/project/data
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: RENDER_DATA_DIR
        value: /opt/render/project/data
      - key: UPLOAD_DIR
        value: /opt/render/project/data/uploads
